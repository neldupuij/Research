start_date: "2015-01-01"
end_date: null
returns: "log"

# ----------------------------
# VAR & FEVD settings
# ----------------------------
forecast_horizon: 10         # H (trading days) for generalized FEVD
select_p_mode: "fixed"
var_max_lag: 1
p_fixed: 1

# ----------------------------
# Rolling window (optional)
# ----------------------------
rolling_window: 250          # W (trading days)
rolling_step: 20             # step between windows
rolling_max_windows: null    # null = no cap; set a number to limit (e.g., 50)
log_every: 5                 # progress log frequency (in windows)

# ----------------------------
# Data quality filters
# ----------------------------
min_history_years: 5         # require at least this many years of history
min_coverage_pct: 90         # minimum % “trading-day coverage” over the span
min_last_date: "2024-01-01"  # drop symbols that don't trade after this date

